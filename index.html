<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Fraunces:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060e1a;--surf:#0c1a2e;--border:#162d4a;--text:#9ec8e8;--bright:#e0f0ff;--acc:#00b4ff;--red:#ff4444;--green:#00e676;--amber:#ffaa00}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}
#topbar{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.sonar{width:38px;height:38px;flex-shrink:0}.sonar svg{width:100%;height:100%}
.ring{transform-origin:center;animation:rp 2s ease-out infinite;opacity:0}
.ring:nth-child(2){animation-delay:.6s}.ring:nth-child(3){animation-delay:1.2s}
@keyframes rp{0%{opacity:.8;transform:scale(.3)}100%{opacity:0;transform:scale(1)}}
.tinfo{flex:1;min-width:0}
#mode-label{font-size:.55rem;color:#4a7a9b;text-transform:uppercase;letter-spacing:.1em}
#main-val{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:700;color:var(--bright);line-height:1;transition:color .3s}
#main-val.flash{color:var(--acc);text-shadow:0 0 14px rgba(0,180,255,.5)}
#sub-status{font-size:.57rem;color:#3a6a8a;margin-top:3px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#3a6a8a;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite}
.dot.sim{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:blink 1s ease-in-out infinite}
.dot.rec{background:var(--red);box-shadow:0 0 8px var(--red);animation:blink .8s ease-in-out infinite}
.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:linear-gradient(135deg,#0066aa,#00336a);border:1px solid #0088cc;color:#e0f0ff;font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:7px 12px;border-radius:4px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.btn:active{filter:brightness(.8)}
.btn.red{background:linear-gradient(135deg,#880000,#550000);border-color:#aa2222}
.btn.green{background:linear-gradient(135deg,#006622,#003311);border-color:#00aa44}
.btn.ghost{background:rgba(0,0,0,.3);border-color:#162d4a}
.btn.amber{background:linear-gradient(135deg,#553300,#331a00);border-color:var(--amber)}
#map{flex:1;position:relative}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;gap:7px;padding:8px 12px 10px;background:rgba(6,14,26,.9);border-top:1px solid var(--border);backdrop-filter:blur(6px);transition:bottom .35s ease}
#bottom-bar .btn{flex:1;max-width:170px;padding:8px;font-size:.62rem;text-align:center}
#live-box{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:rgba(6,14,26,.97);border-top:2px solid var(--border);padding:12px 16px 16px;transform:translateY(100%);transition:transform .35s ease}
#live-box.show{transform:translateY(0)}
.live-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.live-cell{text-align:center;background:#0d1a2c;border-radius:6px;padding:10px 4px 8px}
.live-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--bright);line-height:1}
.live-unit{font-size:.55rem;color:#4a7a9b;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.rec-btns{display:flex;gap:7px}
.rec-btns .btn{flex:1;padding:9px;font-size:.63rem;text-align:center}
#sim-banner{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:1002;background:rgba(120,70,0,.95);border:1px solid var(--amber);border-radius:6px;padding:6px 14px;font-size:.62rem;color:#ffe;white-space:nowrap;pointer-events:none}
#sim-banner.show{display:block}
#legend{position:absolute;top:10px;right:10px;z-index:998;background:rgba(6,14,26,.92);border:1px solid var(--border);border-radius:6px;padding:9px 11px;pointer-events:none}
#legend h4{font-family:'Fraunces',serif;font-size:.74rem;color:var(--bright);margin-bottom:5px;border-bottom:1px solid #162d4a;padding-bottom:3px}
.lr{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:.58rem}
.ll{width:16px;height:10px;border-radius:2px;flex-shrink:0}
.ln{font-size:.54rem;color:#4a7a9b;margin-top:5px;line-height:1.5}
.user-dot{width:16px;height:16px;border-radius:50%;background:#00b4ff;border:3px solid white;box-shadow:0 0 0 4px rgba(0,180,255,.3)}
.sim-dot{width:16px;height:16px;border-radius:50%;background:var(--amber);border:3px solid white;box-shadow:0 0 0 4px rgba(255,170,0,.3)}
.leaflet-control-zoom a{background:var(--surf)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{background:rgba(6,14,26,.8)!important;color:#2a5a7a!important;font-size:.55rem!important}
.leaflet-control-layers{background:var(--surf)!important;border-color:var(--border)!important;color:var(--text)!important}
</style>
</head>

const COLORS={"-60": "#000010", "-55": "#00051e", "-50": "#000a2e", "-45": "#001144", "-40": "#002266", "-35": "#004488", "-30": "#0066aa", "-25": "#1188cc", "-20": "#33aaee", "-15": "#66ccff", "-10": "#99ddff", "-5": "#cceeff", "2": "#88ffcc"};


// ── KARTE ──
const map=L.map('map',{center:[51.229,12.451],zoom:13});
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution:'Esri | LMBV 2017',maxZoom:19});
const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'OpenStreetMap | LMBV 2017',maxZoom:19});
sat.addTo(map);
L.control.layers({'Satellit':sat,'OpenStreetMap':osm},{},{position:'topright'}).addTo(map);

// ── TIEFENZONEN ZEICHNEN ──
const renderer=L.canvas({padding:0.5});
L.geoJSON(DEPTH_GJ,{
  renderer,
  style:f=>{
    const col=COLORS[String(f.properties.depth)]||'#555';
    const shallow=f.properties.depth>=0;
    return{color:shallow?'#00ccff':col,fillColor:col,
      fillOpacity:shallow?0.08:0.28,weight:shallow?2:1.2,opacity:0.9};
  },
  onEachFeature:(f,l)=>{
    if(f.properties.depth!==undefined)
      l.bindTooltip(f.properties.depth+' m',{sticky:true});
  }
}).addTo(map);

// Zoom auf See
const allC=DEPTH_GJ.features.flatMap(f=>f.geometry.coordinates[0]);
const lats=allC.map(c=>c[1]),lons=allC.map(c=>c[0]);
map.fitBounds([[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]],{padding:[20,20]});

// ── TIEFENBESTIMMUNG ──
// Direkt aus den GeoJSON-Polygonen: tiefste Zone die den Punkt enthält.
// Keine eigene Logik - die Tiefen kommen 1:1 aus den depth-Werten.
function getDepth(lat,lon){
  let best=null;
  for(const f of DEPTH_GJ.features){
    const d=f.properties.depth;
    if(d===null||d===undefined||d>=0) continue;
    const coords=f.geometry.coordinates[0];
    let inside=false; let j=coords.length-1;
    for(let i=0;i<coords.length;i++){
      const xi=coords[i][0],yi=coords[i][1];
      const xj=coords[j][0],yj=coords[j][1];
      if((yi>lat)!==(yj>lat)&&lon<(xj-xi)*(lat-yi)/(yj-yi)+xi) inside=!inside;
      j=i;
    }
    if(inside&&(best===null||d<best)) best=d;
  }
  return best;
}

function showDepth(lat,lon,label){
  const depth=getDepth(lat,lon);
  const el=document.getElementById('main-val');
  el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),300);
  if(depth===null){
    el.textContent='See verlassen';
    document.getElementById('stxt').textContent='Ausserhalb';
  }else{
    el.textContent=depth+' m';
    document.getElementById('stxt').textContent=label;
  }
  return depth;
}

// ── GPS ──
let userMarker=null,gpsWatchId=null;
let lastLat=null,lastLon=null,lastTime=null;
let currentDepth='--',currentSpeed='--';

function haversineM(la1,lo1,la2,lo2){
  const R=6371000,dr=Math.PI/180;
  const a=Math.sin((la2-la1)*dr/2)**2+Math.cos(la1*dr)*Math.cos(la2*dr)*Math.sin((lo2-lo1)*dr/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

function startGPS(){
  if(gpsWatchId)return;
  if(!navigator.geolocation){document.getElementById('stxt').textContent='GPS nicht verfuegbar';return;}
  document.getElementById('gps-btn').disabled=true;
  document.getElementById('gps-btn').textContent='...';
  gpsWatchId=navigator.geolocation.watchPosition(onGPS,onGPSErr,
    {enableHighAccuracy:true,maximumAge:2000,timeout:15000});
}

function onGPS(pos){
  document.getElementById('gps-btn').textContent='GPS Aktiv';
  const{latitude:lat,longitude:lon,speed}=pos.coords;
  const now=pos.timestamp;
  document.getElementById('sdot').className=tracking?'dot rec':'dot on';
  document.getElementById('mode-label').textContent=tracking?'REC':'Wassertiefe';
  if(!userMarker){
    userMarker=L.marker([lat,lon],{
      icon:L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]}),
      zIndexOffset:1000
    }).addTo(map);
    map.setView([lat,lon],15,{animate:true});
  }else{userMarker.setLatLng([lat,lon]);}
  let kmh='--';
  if(speed!=null&&speed>=0)kmh=(speed*3.6).toFixed(1);
  else if(lastLat!==null){
    const d=haversineM(lastLat,lastLon,lat,lon),dt=(now-lastTime)/1000;
    if(dt>0.5)kmh=((d/dt)*3.6).toFixed(1);
  }
  currentSpeed=kmh;lastLat=lat;lastLon=lon;lastTime=now;
  const depth=showDepth(lat,lon,'GPS aktiv');
  currentDepth=depth!==null?depth+' m':'--';
  if(tracking)recordPoint(lat,lon,now);
}

function onGPSErr(err){
  document.getElementById('sdot').className='dot err';
  document.getElementById('stxt').textContent=err.code===1?'GPS verweigert':'Kein Signal';
  document.getElementById('gps-btn').disabled=false;
  document.getElementById('gps-btn').textContent='GPS';
  gpsWatchId=null;
}

// ── ROUTE ──
let tracking=false,trackPoints=[],trackLine=null,totalDist=0;

function toggleTrack(){
  if(!gpsWatchId)startGPS();
  if(!tracking)startTracking();
}

function startTracking(){
  tracking=true;trackPoints=[];totalDist=0;
  if(trackLine){map.removeLayer(trackLine);trackLine=null;}
  document.getElementById('track-btn').innerHTML='&#9646; Stopp';
  document.getElementById('track-btn').className='btn red';
  document.getElementById('live-box').className='show';
  document.getElementById('bottom-bar').style.bottom=
    document.getElementById('live-box').offsetHeight+'px';
}

function stopTrack(){
  tracking=false;
  document.getElementById('track-btn').innerHTML='&#9654; Route';
  document.getElementById('track-btn').className='btn green';
  document.getElementById('live-box').className='';
  document.getElementById('bottom-bar').style.bottom='0';
  document.getElementById('stxt').textContent=
    'Route: '+trackPoints.length+' Punkte, '+Math.round(totalDist)+'m';
}

function clearTrack(){
  stopTrack();trackPoints=[];totalDist=0;
  if(trackLine){map.removeLayer(trackLine);trackLine=null;}
}

function recordPoint(lat,lon,time){
  if(trackPoints.length>0){
    const p=trackPoints[trackPoints.length-1];
    totalDist+=haversineM(p.lat,p.lon,lat,lon);
  }
  trackPoints.push({lat,lon,time,depth:currentDepth,speed:currentSpeed});
  const lls=trackPoints.map(p=>[p.lat,p.lon]);
  if(trackLine)trackLine.setLatLngs(lls);
  else trackLine=L.polyline(lls,{color:'#ff6600',weight:4,opacity:.9}).addTo(map);
  document.getElementById('lv-depth').textContent=currentDepth;
  document.getElementById('lv-speed').textContent=
    currentSpeed!=='--'?parseFloat(currentSpeed).toFixed(1):'--';
  document.getElementById('lv-dist').textContent=Math.round(totalDist);
}

function exportGPX(){
  if(!trackPoints.length){alert('Keine Punkte aufgezeichnet.');return;}
  const l=['<?xml version="1.0" encoding="UTF-8"?>',
    '<gpx version="1.1" creator="Stoermthaler Tiefenfinder">',
    '<trk><name>Stoermthaler See Route</name><trkseg>'];
  trackPoints.forEach(p=>l.push(
    '  <trkpt lat="'+p.lat.toFixed(7)+'" lon="'+p.lon.toFixed(7)+'">'+
    '<time>'+new Date(p.time).toISOString()+'</time>'+
    '<desc>Tiefe: '+p.depth+' | Speed: '+p.speed+' km/h</desc></trkpt>'));
  l.push('</trkseg></trk></gpx>');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([l.join('\n')],{type:'application/gpx+xml'}));
  a.download='stoermthaler_route.gpx';a.click();
}
