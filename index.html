<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Störmthaler See">
<meta name="theme-color" content="#060e1a">
<title>Störmthaler See – Tiefenfinder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Fraunces:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#060e1a;--surf:#0c1a2e;--border:#162d4a;--text:#9ec8e8;--bright:#e0f0ff;--acc:#00b4ff;--red:#ff4444;--green:#00e676}
  body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

  #topbar{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
  .sonar{width:38px;height:38px;flex-shrink:0}
  .sonar svg{width:100%;height:100%}
  .ring{transform-origin:center;animation:rp 2s ease-out infinite;opacity:0}
  .ring:nth-child(2){animation-delay:.6s}.ring:nth-child(3){animation-delay:1.2s}
  @keyframes rp{0%{opacity:.8;transform:scale(.3)}100%{opacity:0;transform:scale(1)}}
  .tinfo{flex:1;min-width:0}
  #mode-label{font-size:.55rem;color:#4a7a9b;text-transform:uppercase;letter-spacing:.1em}
  #main-val{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:700;color:var(--bright);line-height:1;transition:color .3s}
  #main-val.flash{color:var(--acc);text-shadow:0 0 14px rgba(0,180,255,.5)}
  #sub-status{font-size:.57rem;color:#3a6a8a;margin-top:3px;display:flex;align-items:center;gap:5px}
  .dot{width:6px;height:6px;border-radius:50%;background:#3a6a8a;flex-shrink:0}
  .dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite}
  .dot.rec{background:var(--red);box-shadow:0 0 8px var(--red);animation:blink .8s ease-in-out infinite}
  .dot.err{background:var(--red)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .btn{background:linear-gradient(135deg,#0066aa,#00336a);border:1px solid #0088cc;color:#e0f0ff;font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:7px 13px;border-radius:4px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .btn:hover{filter:brightness(1.2)}
  .btn:active{filter:brightness(.8)}
  .btn.red{background:linear-gradient(135deg,#880000,#550000);border-color:#aa2222}
  .btn.green{background:linear-gradient(135deg,#006622,#003311);border-color:#00aa44}
  .btn.ghost{background:rgba(0,0,0,.3);border-color:#162d4a}

  #map{flex:1;position:relative}

  /* ── BOTTOM BAR ── */
  #bottom-bar{
    position:absolute;bottom:0;left:0;right:0;z-index:999;
    display:flex;justify-content:center;gap:8px;padding:8px 14px 10px;
    background:rgba(6,14,26,.88);border-top:1px solid var(--border);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    transition:bottom .35s ease;
  }
  #bottom-bar .btn{flex:1;max-width:200px;padding:9px;font-size:.65rem;text-align:center}

  /* ── LIVE BOX ── */
  #live-box{
    position:absolute;bottom:0;left:0;right:0;z-index:1000;
    background:rgba(6,14,26,.97);border-top:2px solid var(--border);
    padding:12px 16px 16px;
    transform:translateY(100%);transition:transform .35s ease;
  }
  #live-box.show{transform:translateY(0)}
  .live-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .live-cell{text-align:center;background:#0d1a2c;border-radius:6px;padding:10px 4px 8px}
  .live-val{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;color:var(--bright);line-height:1}
  .live-unit{font-size:.55rem;color:#4a7a9b;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
  .rec-btns{display:flex;gap:7px}
  .rec-btns .btn{flex:1;padding:9px;font-size:.65rem;text-align:center}

  /* ── LEGENDE ── */
  #legend{position:absolute;top:10px;right:10px;z-index:998;background:rgba(6,14,26,.92);border:1px solid var(--border);border-radius:6px;padding:9px 11px;pointer-events:none}
  #legend h4{font-family:'Fraunces',serif;font-size:.74rem;color:var(--bright);margin-bottom:5px;border-bottom:1px solid #162d4a;padding-bottom:3px}
  .lr{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:.59rem}
  .ll{width:16px;height:2px;border-radius:1px;flex-shrink:0}
  .ln{font-size:.54rem;color:#4a7a9b;margin-top:5px;line-height:1.5}

  .user-dot{width:16px;height:16px;border-radius:50%;background:#00b4ff;border:3px solid white;box-shadow:0 0 0 4px rgba(0,180,255,.3);animation:pm 2s ease-in-out infinite}
  @keyframes pm{0%,100%{box-shadow:0 0 0 4px rgba(0,180,255,.3)}50%{box-shadow:0 0 0 10px rgba(0,180,255,.08)}}

  .leaflet-control-zoom a{background:var(--surf)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-control-zoom a:hover{background:var(--border)!important}
  .leaflet-control-attribution{background:rgba(6,14,26,.8)!important;color:#2a5a7a!important;font-size:.55rem!important}
  .leaflet-control-layers{background:var(--surf)!important;border-color:var(--border)!important;color:var(--text)!important}
</style>
</head>

<div id="topbar">
  <div class="sonar">

      <button class="btn ghost" onclick="exportGPX()">↓ GPX</button>
      <button class="btn ghost" onclick="clearTrack()">🗑 Löschen</button>
    </div>
  </div>
</div>

51.290724],[12.461402,51.291141],[12.461721,51.29139],[12.462229,51.291963],[12.462583,51.29205],[12.462996,51.292409],[12.463291,51.292774],[12.463645,51.293011],[12.463941,51.292941],[12.463988,51.292855],[12.464177,51.292797],[12.464165,51.292582],[12.46407,51.292449],[12.464212,51.292484],[12.464413,51.29271],[12.464578,51.292664],[12.464307,51.2922],[12.464236,51.292166],[12.464118,51.291963],[12.463941,51.291784],[12.463929,51.291685],[12.463787,51.291535],[12.463787,51.291477],[12.46315,51.291031],[12.462146,51.290007],[12.461886,51.289995],[12.461816,51.289798],[12.46139,51.289364],[12.461036,51.288907],[12.46106,51.288745],[12.461568,51.288149],[12.461414,51.288091],[12.461367,51.287848],[12.461674,51.287691],[12.461686,51.287622],[12.462004,51.287379],[12.461827,51.287251],[12.461875,51.28717],[12.462241,51.286852],[12.463043,51.286487],[12.463173,51.286383],[12.463161,51.286314],[12.462701,51.285897],[12.462465,51.285579],[12.462488,51.285526],[12.4623,51.285127],[12.461993,51.28467],[12.462063,51.284525],[12.461863,51.284415],[12.461686,51.284212],[12.461686,51.283883],[12.461745,51.283657],[12.462158,51.283026],[12.462276,51.28265],[12.462488,51.282435],[12.462937,51.282106],[12.46407,51.282331],[12.464814,51.28236],[12.465818,51.28247],[12.466101,51.282412],[12.466762,51.282117],[12.467105,51.282059]]}}]};

const dColors = {'-5':'#cceeff','-10':'#99ddff','-15':'#66ccff','-20':'#33aaee',
  '-25':'#1188cc','-30':'#0066aa','-35':'#004488','-40':'#002266','-45':'#001144','-50':'#000a2e'};

const tiefenRaw = GJ.features.filter(f => f.properties.type === 'tiefenlinie');
const uferRaw   = GJ.features.filter(f => f.properties.type === 'uferlinie');

function transformCoord(lon, lat) {
  let dx = (lon - CX) * COS_LAT, dy = lat - CY;
  dx *= TR.sx; dy *= TR.sy;
  const rad = TR.rot * Math.PI / 180;
  const cosR = Math.cos(rad), sinR = Math.sin(rad);
  return [CX + (dx*cosR - dy*sinR) / COS_LAT + TR.x,
          CY + (dx*sinR + dy*cosR) + TR.y];
}

function makeGJ(raw) {
  return {type:'FeatureCollection', features: raw.map(f => ({
    type:'Feature', properties:f.properties,
    geometry:{type:'LineString', coordinates:f.geometry.coordinates.map(c=>transformCoord(c[0],c[1]))}
  })) };
}

const renderer = L.canvas({padding:0.5});

const tiefenLayer = L.geoJSON(makeGJ(tiefenRaw), {
  renderer,
  style: f => ({color: dColors[String(f.properties.depth_m)] || '#1a3a5a', weight:1.3, opacity:0.9})
}).addTo(map);

L.geoJSON(makeGJ(uferRaw), {
  renderer,
  style: {color:'#00b4ff', weight:2.5, opacity:1}
}).addTo(map);

map.fitBounds(tiefenLayer.getBounds(), {padding:[20,20]});

// ── SEGMENTE FÜR TIEFENBERECHNUNG ──
const segments = [];
makeGJ(tiefenRaw).features.forEach(f => {
  const depth = f.properties.depth_m, c = f.geometry.coordinates;
  for (let i = 0; i < c.length-1; i++)
    segments.push({depth, x1:c[i][0], y1:c[i][1], x2:c[i+1][0], y2:c[i+1][1]});
});

function ptSegDist(px,py,x1,y1,x2,y2) {
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  if (!l2) return Math.hypot(px-x1,py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}

function nearestDepth(lat, lon) {
  let best=null, bd=Infinity;
  for (const s of segments) {
    const d = ptSegDist(lon,lat,s.x1,s.y1,s.x2,s.y2);
    if (d < bd) { bd=d; best=s; }
  }
  return best ? {depth:best.depth, distM:bd*111000} : null;
}

// ── GPS ──
let userMarker=null, gpsWatchId=null;
let lastLat=null, lastLon=null, lastTime=null;
let currentDepth='—', currentSpeed='—';

function haversineM(la1,lo1,la2,lo2) {
  const R=6371000, dr=Math.PI/180;
  const a=Math.sin((la2-la1)*dr/2)**2+Math.cos(la1*dr)*Math.cos(la2*dr)*Math.sin((lo2-lo1)*dr/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

function startGPS() {
  if (gpsWatchId) return;
  if (!navigator.geolocation) { document.getElementById('stxt').textContent='GPS nicht verfügbar'; return; }
  const btn = document.getElementById('gps-btn');
  btn.disabled=true; btn.textContent='⏳';
  gpsWatchId = navigator.geolocation.watchPosition(onGPS, onGPSErr,
    {enableHighAccuracy:true, maximumAge:2000, timeout:15000});
}

function onGPS(pos) {
  document.getElementById('gps-btn').textContent='📍 Aktiv';
  const {latitude:lat, longitude:lon, speed} = pos.coords;
  const now = pos.timestamp;
  document.getElementById('sdot').className = tracking ? 'dot rec' : 'dot on';

  if (!userMarker) {
    userMarker = L.marker([lat,lon], {
      icon: L.divIcon({className:'', html:'<div class="user-dot"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      zIndexOffset: 1000
    }).addTo(map);
    map.setView([lat,lon], 15, {animate:true});
  } else {
    userMarker.setLatLng([lat,lon]);
  }

  // Tiefe
  const r = nearestDepth(lat, lon);
  currentDepth = r && r.distM < 300 ? r.depth+' m' : r && r.distM < 600 ? '< 5 m' : '—';

  // Geschwindigkeit
  let kmh = '—';
  if (speed != null && speed >= 0) {
    kmh = (speed*3.6).toFixed(1);
  } else if (lastLat !== null) {
    const dist = haversineM(lastLat,lastLon,lat,lon);
    const dt = (now - lastTime)/1000;
    if (dt > 0.5) kmh = ((dist/dt)*3.6).toFixed(1);
  }
  currentSpeed = kmh;
  lastLat=lat; lastLon=lon; lastTime=now;

  // Topbar
  if (!tracking) {
    const el = document.getElementById('main-val');
    el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),300);
    document.getElementById('main-val').textContent = currentDepth;
    document.getElementById('mode-label').textContent = 'Wassertiefe';
    document.getElementById('stxt').textContent = r && r.distM<300 ? `Linie ${Math.round(r.distM)}m entfernt · ±5m` : r ? `${Math.round(r.distM)}m zur nächsten Linie` : 'Außerhalb des Sees';
  }

  if (tracking) recordPoint(lat, lon, now);
}

function onGPSErr(err) {
  document.getElementById('sdot').className='dot err';
  document.getElementById('stxt').textContent = err.code===1 ? 'GPS verweigert' : 'Kein GPS-Signal';
  document.getElementById('gps-btn').disabled=false;
  document.getElementById('gps-btn').textContent='📍 GPS';
  gpsWatchId=null;
}

// ── ROUTENAUFZEICHNUNG ──
let tracking=false, trackPoints=[], trackLine=null, totalDist=0;

function toggleTrack() {
  if (!gpsWatchId) { startGPS(); }
  if (!tracking) startTracking();
}

function startTracking() {
  tracking=true; trackPoints=[]; totalDist=0;
  if (trackLine) { map.removeLayer(trackLine); trackLine=null; }
  document.getElementById('track-btn').textContent='● Aufzeichnung läuft';
  document.getElementById('track-btn').className='btn red';
  document.getElementById('live-box').className='show';
  document.getElementById('mode-label').textContent='● REC';
  document.getElementById('sdot').className='dot rec';
  const lh = document.getElementById('live-box').offsetHeight;
  document.getElementById('bottom-bar').style.bottom = lh+'px';
}

function stopTrack() {
  tracking=false;
  document.getElementById('track-btn').textContent='▶ Route aufzeichnen';
  document.getElementById('track-btn').className='btn green';
  document.getElementById('live-box').className='';
  document.getElementById('bottom-bar').style.bottom='0';
  document.getElementById('mode-label').textContent='Wassertiefe';
  document.getElementById('sdot').className='dot on';
  document.getElementById('stxt').textContent=`Route: ${trackPoints.length} Punkte · ${Math.round(totalDist)}m`;
}

function clearTrack() {
  stopTrack();
  trackPoints=[]; totalDist=0;
  if (trackLine) { map.removeLayer(trackLine); trackLine=null; }
  document.getElementById('stxt').textContent='Route gelöscht';
}

function recordPoint(lat, lon, time) {
  if (trackPoints.length > 0) {
    const p = trackPoints[trackPoints.length-1];
    totalDist += haversineM(p.lat, p.lon, lat, lon);
  }
  trackPoints.push({lat, lon, time, depth:currentDepth, speed:currentSpeed});

  if (trackPoints.length >= 2) {
    const lls = trackPoints.map(p=>[p.lat,p.lon]);
    if (trackLine) { trackLine.setLatLngs(lls); }
    else { trackLine = L.polyline(lls,{color:'#ff6600',weight:3,opacity:.9}).addTo(map); }
  }

  document.getElementById('lv-depth').textContent = currentDepth;
  document.getElementById('lv-speed').textContent = currentSpeed!=='—' ? parseFloat(currentSpeed).toFixed(1) : '—';
  document.getElementById('lv-dist').textContent = Math.round(totalDist);
  document.getElementById('main-val').textContent = currentDepth;
}

function exportGPX() {
  if (!trackPoints.length) { alert('Keine Punkte aufgezeichnet.'); return; }
  const lines = ['<?xml version="1.0" encoding="UTF-8"?>',
    '<gpx version="1.1" creator="Störmthaler Tiefenfinder">',
    '<trk><name>Störmthaler See</name><trkseg>'];
  trackPoints.forEach(p => {
    lines.push(`  <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lon.toFixed(7)}"><time>${new Date(p.time).toISOString()}</time><desc>Tiefe: ${p.depth}, Speed: ${p.speed} km/h</desc></trkpt>`);
  });
  lines.push('</trkseg></trk></gpx>');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')],{type:'application/gpx+xml'}));
  a.download = 'stoermthaler_route.gpx';
  a.click();
}
</script>
